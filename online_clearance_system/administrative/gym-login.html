<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Login</title>
    <link rel="stylesheet" href="administrative.css">
</head>
<body class="login-body">
    <div class="login-main">
        <div class="dept-login-icon">🏋</div>

        <div class="login-system">Online Clearance System</div>
        <div class="dept-login-title">Gym Department Login</div>
        <div class="login-subtitle">Approve gym clearance requests</div>

        <div class="login-card">
            <div class="form-row">
                <label>Email Address</label>
                <input type="text" placeholder="Enter gym email">
            </div>

            <div class="form-row">
                <label>Password</label>
                <input type="password" placeholder="Enter your password">
            </div>

            <a class="admin-login-btn" href="gym-dashboard.html">Log In</a>
        </div>

        <a class="admin-back-link" href="administrator-dashboard.html">← Back to administrator dashboard</a>
    </div>
</body>
</html>
